<!doctype html>
<html lang="bn">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>গোপনীয়তা নীতি</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
<link rel="icon" type="image/png" sizes="1024x1024" href="../icon-1024.png">
<link rel="apple-touch-icon" href="../icon-1024.png">

    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #0b1320; color: #f5f7fb; }
      main { max-width: 760px; margin: 0 auto; padding: 48px 24px 72px; }
      h1 { font-size: 2.1rem; margin-bottom: 12px; }
      p, li { line-height: 1.7; color: #d7dfeb; }
      .card { background: rgba(255,255,255,0.06); border-radius: 24px; padding: 24px; margin-top: 24px; }
    </style>
  </head>
  <body>
    <main>
      <h1>গোপনীয়তা নীতি</h1>
      <p>অ্যাপটি প্রিসেট ডেটা ডিভাইসে সংরক্ষণ করে এবং কেবল তখনই রপ্তানি করে যখন আপনি এই অ্যাপ ব্যবহারকারী অন্য ফোনে তা ভাগ করতে চান।</p>
      <section class="card">
        <ul>
          <li>অ্যাপটি ব্যক্তিগত তথ্য বিক্রি করে না।</li>
<li>কোনো ইন-অ্যাপ ক্রয় বা সাবস্ক্রিপশন নেই।</li>
<li>আমদানি ও রপ্তানি করা প্রিসেট ফাইল আপনার নিয়ন্ত্রণেই থাকে।</li>
        </ul>
      </section>
    </main>
  </body>
</html>
