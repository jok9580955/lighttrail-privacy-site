<!doctype html>
<html lang="hi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>गोपनीयता नीति</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
<link rel="icon" type="image/png" sizes="1024x1024" href="../icon-1024.png">
<link rel="apple-touch-icon" href="../icon-1024.png">

    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #0b1320; color: #f5f7fb; }
      main { max-width: 760px; margin: 0 auto; padding: 48px 24px 72px; }
      h1 { font-size: 2.1rem; margin-bottom: 12px; }
      p, li { line-height: 1.7; color: #d7dfeb; }
      .card { background: rgba(255,255,255,0.06); border-radius: 24px; padding: 24px; margin-top: 24px; }
    </style>
  </head>
  <body>
    <main>
      <h1>गोपनीयता नीति</h1>
      <p>ऐप प्रीसेट डेटा को डिवाइस पर रखता है और केवल तब निर्यात करता है जब आप उसे इस ऐप वाले किसी दूसरे फोन से साझा करना चुनते हैं।</p>
      <section class="card">
        <ul>
          <li>ऐप व्यक्तिगत डेटा नहीं बेचता।</li>
<li>कोई इन ऐप खरीदारी या सदस्यता नहीं है।</li>
<li>आयात और निर्यात की गई प्रीसेट फाइलें आपके नियंत्रण में रहती हैं।</li>
        </ul>
      </section>
    </main>
  </body>
</html>
