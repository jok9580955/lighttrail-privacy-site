<!doctype html>
<html lang="lv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Privātuma politika</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
<link rel="icon" type="image/png" sizes="1024x1024" href="../icon-1024.png">
<link rel="apple-touch-icon" href="../icon-1024.png">

    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #0b1320; color: #f5f7fb; }
      main { max-width: 760px; margin: 0 auto; padding: 48px 24px 72px; }
      h1 { font-size: 2.1rem; margin-bottom: 12px; }
      p, li { line-height: 1.7; color: #d7dfeb; }
      .card { background: rgba(255,255,255,0.06); border-radius: 24px; padding: 24px; margin-top: 24px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Privātuma politika</h1>
      <p>Lietotne glabā presetu datus ierīcē un eksportē tos tikai tad, kad izvēlaties tos kopīgot ar citu tālruni, kurā ir šī lietotne.</p>
      <section class="card">
        <ul>
          <li>Lietotne nepārdod personas datus.</li>
<li>Nav pirkumu lietotnē vai abonementu.</li>
<li>Importētie un eksportētie presetu faili paliek jūsu kontrolē.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
